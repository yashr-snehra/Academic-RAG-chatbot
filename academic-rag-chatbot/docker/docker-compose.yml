services:
  qdrant:
    image: qdrant/qdrant:v1.18.0   # match the installed qdrant-client major.minor
    ports:
      - "6333:6333"   # REST API + Dashboard UI
      - "6334:6334"   # gRPC
    volumes:
      - ../qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    # No healthcheck: the Qdrant image is distroless (no curl/wget/sh), so any
    # in-container probe reports "unhealthy" even though the service is fine.
    # The API connects directly and tolerates a brief startup delay.

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ../redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      # Inside the compose network, reach the data services by name…
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      # …and reach Ollama (the GPU/IPEX-LLM server) running on the host machine.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach the host (Linux)
    depends_on:
      - qdrant
      - redis
